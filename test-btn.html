<!DOCTYPE html>
<html>
<head>
<style>
.btn-17 {
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
  overflow: hidden;
  position: relative;
  border-radius: 99rem;
  z-index: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  background-color: white; /* Simulate bg-white */
  padding: 1rem 3rem;
  color: black;
}
.btn-17 .text-container {
  display: block;
  overflow: hidden;
  position: relative;
  z-index: 10;
}
.btn-17 .text {
  display: block;
  position: relative;
}
.btn-17:hover .text {
  animation: move-up-alternate 0.3s forwards;
}
@keyframes move-up-alternate {
  0% { transform: translateY(0); }
  50% { transform: translateY(80%); }
  51% { transform: translateY(-80%); }
  to { transform: translateY(0); }
}
.btn-17:after,
.btn-17:before {
  --skew: 0.2;
  background: #00F2FE;
  content: "";
  display: block;
  height: 102%;
  left: calc(-50% - 50% * var(--skew));
  pointer-events: none;
  position: absolute;
  top: -104%;
  transform: skew(calc(150deg * var(--skew))) translateY(var(--progress, 0));
  transition: transform 0.2s ease;
  width: 100%;
}
.btn-17:after {
  --progress: 0%;
  left: calc(50% + 50% * var(--skew));
  top: 102%;
  z-index: -1;
}
.btn-17:hover:before {
  --progress: 100%;
}
.btn-17:hover:after {
  --progress: -102%;
}
</style>
</head>
<body>
<button class="btn-17">
  <span class="text-container">
    <span class="text">View Projects</span>
  </span>
</button>
</body>
</html>
