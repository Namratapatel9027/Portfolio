<!DOCTYPE html>
<html>
<head>
<style>
.btn-17 {
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
  overflow: hidden;
  position: relative;
  border-radius: 99rem;
  z-index: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  min-width: 220px !important;
  border: 1px solid rgba(255, 255, 255, 0.15) !important;
  background: white;
  padding: 1rem 2rem;
  text-decoration: none;
  color: black;
}
.btn-17 .text-container {
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  z-index: 10;
  width: 100%;
  height: 100%;
}
.btn-17 .text {
  display: flex;
  align-items: center;
  position: relative;
}
</style>
</head>
<body>
<div style="pointer-events: none; padding: 50px;">
  <div style="pointer-events: auto;">
    <a href="https://example.com" class="btn-17">
      <span class="text-container">
        <span class="text">View Projects</span>
      </span>
    </a>
  </div>
</div>
</body>
</html>
